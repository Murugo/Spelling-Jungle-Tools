<html> 
  <title>Spelling Jungle Tools</title>
  <head>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="main.js"></script>
  </head>
  <body>
    <div class="icons">
      <div class="icon" id="mainWindowIcon">
        <div class="icon-image"></div>
        <div class="icon-text">Main Window</div>
      </div>
      <div class="icon" id="secondaryWindowIcon">
        <div class="icon-image"></div>
        <div class="icon-text">Second Window</div>
      </div>
    </div>
    <div class="view-windows">
      <div class="view-window" id="mainWindow" style="display: none">
        <div class="view-window-inner">
          <div class="view-window-content">
            Lorem ipsum dolor sit amet
          </div>
        </div>
      </div>
      <div class="view-window" id="secondaryWindow" style="display: none">
        <div class="view-window-inner">
          <div class="view-window-content">
            No Chrome, this isn't Latin
          </div>
        </div>
      </div>
    </div>
    <div class="taskbar" id="taskbar">
      <button type="button" class="taskbar-start-button">Start</button>
      <div class="taskbar-separator"></div>
      <div class="taskbar-windows" id="taskbarWindows"></div>
    </div>
  </body>
</html>
