<html> 
  <title>Spelling Jungle Tools</title>
  <head>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="main.js"></script>
  </head>
  <body>
    <div class="icon" id="mainWindowIcon">
      <div class="icon-image"></div>
      <div class="icon-text">Main Window</div>
    </div>
    <div class="icon" id="secondaryWindowIcon">
      <div class="icon-image"></div>
      <div class="icon-text">Second Window</div>
    </div>

    <div class="view-window" id="mainWindow">
      <div class="view-window-border-nw"></div>
      <div class="view-window-border-n"></div>
      <div class="view-window-border-ne"></div>
      <div class="view-window-border-w"></div>
      <div>
        <div class="view-window-title">
          <div class="view-window-title-text"></div>
          <div class="view-window-title-buttons">
            <button type="button" class="view-window-minimize"></button>
            <button type="button" class="view-window-maximize"></button>
            <button type="button" class="view-window-close"></button>
          </div>
        </div>
        <div class="view-window-content">
          Lorem ipsum dolor sit amet
        </div>
      </div>
      <div class="view-window-border-e"></div>
      <div class="view-window-border-sw"></div>
      <div class="view-window-border-s"></div>
      <div class="view-window-border-se"></div>
    </div>

    <div class="view-window" id="secondaryWindow">
      <div class="view-window-border-nw"></div>
      <div class="view-window-border-n"></div>
      <div class="view-window-border-ne"></div>
      <div class="view-window-border-w"></div>
      <div>
        <div class="view-window-title">
          <div class="view-window-title-text"></div>
          <div class="view-window-title-buttons">
            <button type="button" class="view-window-minimize"></button>
            <button type="button" class="view-window-maximize"></button>
            <button type="button" class="view-window-close"></button>
          </div>
        </div>
        <div class="view-window-content">
          No Chrome, this isn't Latin
        </div>
      </div>
      <div class="view-window-border-e"></div>
      <div class="view-window-border-sw"></div>
      <div class="view-window-border-s"></div>
      <div class="view-window-border-se"></div>
    </div>

    <div class="taskbar" id="taskbar">
      <button type="button" class="taskbar-start-button">Start</button>
      <div class="taskbar-separator"></div>
      <div class="taskbar-windows" id="taskbarWindows">
      </div>
    </div>

  </body>
</html>
