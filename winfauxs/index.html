<html> 
  <title>Spelling Jungle Tools</title>
  <head>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="main.js"></script>
  </head>
  <body>

    <div class="view-window" id="mainWindow">
      <div class="view-window-border-nw"></div>
      <div class="view-window-border-n"></div>
      <div class="view-window-border-ne"></div>
      <div class="view-window-border-w"></div>
      <div>
        <div class="view-window-title">
          <div class="view-window-title-text">Test Window</div>
          <div class="view-window-title-buttons">
            <button type="button"><img src="images/title-button-minimize.png"></button>
            <button type="button"><img src="images/title-button-maximize.png"></button>
            <button type="button"><img src="images/title-button-close.png"></button>
          </div>
        </div>
        <div class="view-window-content">
          Lorem ipsum dolor sit amet
        </div>
      </div>
      <div class="view-window-border-e"></div>
      <div class="view-window-border-sw"></div>
      <div class="view-window-border-s"></div>
      <div class="view-window-border-se"></div>
    </div>

    <div class="view-window" id="secondaryWindow">
      <div class="view-window-border-nw"></div>
      <div class="view-window-border-n"></div>
      <div class="view-window-border-ne"></div>
      <div class="view-window-border-w"></div>
      <div>
        <div class="view-window-title">
          <div class="view-window-title-text">Test Window 2 That Has A Long Title</div>
          <div class="view-window-title-buttons">
            <button type="button"><img src="images/title-button-minimize.png"></button>
            <button type="button"><img src="images/title-button-maximize.png"></button>
            <button type="button"><img src="images/title-button-close.png"></button>
          </div>
        </div>
        <div class="view-window-content">
          No Chrome, this isn't Latin
        </div>
      </div>
      <div class="view-window-border-e"></div>
      <div class="view-window-border-sw"></div>
      <div class="view-window-border-s"></div>
      <div class="view-window-border-se"></div>
    </div>

  </body>
</html>
