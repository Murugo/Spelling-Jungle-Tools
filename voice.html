<html> 
  <title>Spelling Jungle - Voice Preview</title>
  <head>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="voice-text.js"></script>
    <script type="text/javascript" src="voice.js"></script>
  </head>
  <body>
    <div class="container-input">
      <div class="input-label">Load BSTCDRES.DLL:</div>
      <input type="file" id="yobiDll" accept=".dll"/>
    </div>
    <div class="container-voice-display">
      <div class="container-yobi-display">
        <canvas class="yobi-canvas" id="yobiCanvas" width="148px" height="300px"></canvas>
        <label for="showBackground" class="checkbox-show-background">
          <input type="checkbox" id="showBackground" checked="true" disabled="true">Show Background
        </label>
        <input type="color" class="background-color" id="backgroundColor" value="#A0A0A0">
      </div>
      <div>
        <select id="bankSelect" class="bank-select"></select>
        <select id="voiceSelect" class="voice-select" size="20"></select>
        <div class="container-audio">
          <button id="playSound" type="button" class="audio-control" disabled="true">▶</button>
          <input type="range" class="audio-control" id="volume" min="0" max="1" value="1" step="0.01" />
          <div class="audio-control" id="volumeDisplay">100%</div>
        </div>
      </div>
    </div>
    <div class="container" id="statusContainer" style="display: none">
      <div id="statusText"></div>
    </div>
  </body>
</html>
